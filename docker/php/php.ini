memory_limit = 512M

; Dwanaście zdjęć na ogłoszenie, każde do 10 MB (config/ads.php). post_max_size
; musi przebić 12 x 10 MB plus pola formularza — inaczej PHP po cichu odrzuci
; payload i Laravel zobaczy pusty request, zanim walidacja w ogóle ruszy.
; Ten sam limit musi mieć nginx (client_max_body_size) oraz proxy przed nim.
upload_max_filesize = 10M
post_max_size = 150M
max_file_uploads = 24

max_execution_time = 60

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

date.timezone = Europe/Warsaw
